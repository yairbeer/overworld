<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overworld Color Palette</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #07090f; /* Deep dark space feel */
            --text-main: #e8f4f8;
            --text-muted: #8899aa;
            --card-bg: rgba(25, 32, 60, 0.4);
            --card-border: rgba(68, 136, 255, 0.2);
            --card-hover-border: rgba(68, 136, 255, 0.6);
            --accent: #00e5ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 68, 170, 0.03) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff, #8899aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 300;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .btn {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }

        input[type="file"] {
            display: none;
        }

        /* Categories */
        .category-container {
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .category-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 24px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-title::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Swatch Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--card-hover-border);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-color-display {
            height: 140px;
            width: 100%;
            position: relative;
            transition: opacity 0.3s;
        }

        .card-color-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.9;
        }

        .card:hover .card-color-bg {
            opacity: 1;
        }

        .card-info {
            padding: 20px;
        }

        .role-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .color-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
        }

        .hex-code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .card:hover .hex-code {
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
        }

        .usage {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.3);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            border: 2px dashed var(--card-border);
            border-radius: 16px;
            background: rgba(0,0,0,0.2);
            color: var(--text-muted);
            display: none;
        }
        
        .empty-state.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Aesthetic System</h1>
        <p class="subtitle">Overworld Color Palette Viewer</p>
    </header>

    <div class="controls">
        <label for="fileUpload" class="btn" title="Upload custom CSV file">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Upload CSV File
        </label>
        <input type="file" id="fileUpload" accept=".csv" />
        
        <button id="loadDefaultBtn" class="btn" style="background: transparent; border-color: var(--text-muted); color: var(--text-muted);" title="Reset to initial output/04_color_palette.csv data">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
            Refresh Demo
        </button>
    </div>

    <div id="dropZone" class="empty-state active">
        <h2>No Data Loaded</h2>
        <p style="margin-top: 10px;">Click "Upload" or drag & drop a CSV file here.</p>
    </div>

    <div id="paletteContent"></div>
</div>

<div id="toast" class="toast">Copied to clipboard!</div>

<script>
const defaultCsv = `Role,Color Name,Hex,Usage
Background deep,Space Black,#0a0a1a,Main background
Background mid,Deep Navy,#0f1535,Mid background layer
Background near,Dark Slate,#1a2040,Near parallax layer
Player primary,Cyan,#00e5ff,Player ship main color
Player secondary,White,#e8f4f8,Player ship highlights
Player accent,Electric Blue,#4488ff,Player engine glow
Enemy primary,Steel Gray,#8899aa,Robot/machine base color
Enemy secondary,Rust Orange,#cc5522,Machine accents, joints
Enemy accent,Red Alert,#ff2244,Enemy eyes, danger signals
Player shot,Bright Yellow,#ffee00,Player projectiles
Enemy shot,Hot Pink,#ff44aa,Enemy projectiles
Explosion,Orange-White,#ffaa33,Explosion center
Explosion outer,Deep Orange,#ff4400,Explosion edges
XP / pickup,Lime Green,#44ff88,Collectibles, XP orbs
UI primary,White,#ffffff,Text, outlines
UI secondary,Light Blue,#aaddff,Secondary UI elements
UI warning,Amber,#ffaa00,Health warnings
UI danger,Red,#ff3333,Critical health`;

const fileUpload = document.getElementById('fileUpload');
const loadDefaultBtn = document.getElementById('loadDefaultBtn');
const paletteContent = document.getElementById('paletteContent');
const dropZone = document.getElementById('dropZone');

function parseCSV(csvText) {
    const lines = csvText.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim());
    const data = [];
    
    for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const values = lines[i].split(',').map(v => v.trim());
        let entry = {};
        headers.forEach((h, index) => {
            entry[h] = values[index];
        });
        data.push(entry);
    }
    return data;
}

function getCategory(role) {
   let lower = role.toLowerCase();
   if (lower.startsWith('background')) return 'Environments & Backgrounds';
   if (lower.startsWith('player')) return 'Player Assets';
   if (lower.startsWith('enemy')) return 'Enemy Entities';
   if (lower.startsWith('ui')) return 'Interface & UI';
   if (lower.startsWith('explosion') || lower.startsWith('xp')) return 'VFX & Pickups';
   return 'Miscellaneous';
}

function renderPalette(data) {
    dropZone.classList.remove('active');
    paletteContent.innerHTML = '';
    
    // Grouping
    const grouped = {};
    data.forEach(item => {
        const cat = getCategory(item.Role || '');
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(item);
    });

    Object.keys(grouped).forEach((cat, index) => {
        const section = document.createElement('div');
        section.className = 'category-container';
        section.style.animationDelay = `${0.1 * index}s`;
        
        const title = document.createElement('h2');
        title.className = 'category-title';
        title.innerHTML = cat;
        // set title accent color based on category roughly
        if(cat.includes('Player')) title.style.setProperty('--accent', '#00e5ff');
        else if(cat.includes('Enemy')) title.style.setProperty('--accent', '#ff2244');
        else if(cat.includes('Environment')) title.style.setProperty('--accent', '#4488ff');
        else if(cat.includes('VFX')) title.style.setProperty('--accent', '#ffaa33');
        else title.style.setProperty('--accent', '#ffffff');

        const grid = document.createElement('div');
        grid.className = 'grid';

        grouped[cat].forEach(color => {
            const hex = color.Hex || '#000000';
            const shadowColor = hex === '#000000' || hex === '#0a0a1a' ? 'rgba(255,255,255,0.1)' : hex;
            
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => copyToClipboard(hex);
            
            // Fix text color for light backgrounds
            const r = parseInt(hex.slice(1,3), 16) || 0;
            const g = parseInt(hex.slice(3,5), 16) || 0;
            const b = parseInt(hex.slice(5,7), 16) || 0;
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            
            card.innerHTML = `
                <div class="card-color-display">
                    <div class="card-color-bg" style="background-color: ${hex}; box-shadow: inset 0 -20px 40px rgba(0,0,0,0.5), 0 0 20px ${shadowColor}40;"></div>
                </div>
                <div class="card-info">
                    <span class="role-badge">${color.Role}</span>
                    <h3 class="color-name">${color['Color Name']}</h3>
                    <div class="hex-code">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        ${hex.toUpperCase()}
                    </div>
                    <p class="usage">${color.Usage}</p>
                </div>
            `;
            
            // Add subtle hover glow dynamically
            card.addEventListener('mouseenter', () => {
                card.style.borderColor = hex;
                card.style.boxShadow = `0 10px 30px ${hex}33`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.borderColor = 'var(--card-border)';
                card.style.boxShadow = 'none';
            });

            grid.appendChild(card);
        });

        section.appendChild(title);
        section.appendChild(grid);
        paletteContent.appendChild(section);
    });
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.innerText = `Copied ${text} to clipboard!`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    });
}

loadDefaultBtn.addEventListener('click', () => {
    const data = parseCSV(defaultCsv);
    renderPalette(data);
});

fileUpload.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = parseCSV(event.target.result);
            renderPalette(data);
        };
        reader.readAsText(file);
    }
});

// Drag and drop handling
document.addEventListener('dragover', (e) => {
    e.preventDefault();
    if(dropZone.classList.contains('active')) {
        dropZone.style.borderColor = 'var(--accent)';
        dropZone.style.background = 'rgba(0, 229, 255, 0.05)';
    }
});
document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    if(dropZone.classList.contains('active')) {
        dropZone.style.borderColor = 'var(--card-border)';
        dropZone.style.background = 'rgba(0,0,0,0.2)';
    }
});
document.addEventListener('drop', (e) => {
    e.preventDefault();
    if(dropZone.classList.contains('active')) {
        dropZone.style.borderColor = 'var(--card-border)';
        dropZone.style.background = 'rgba(0,0,0,0.2)';
    }
    if (e.dataTransfer.files.length) {
        const file = e.dataTransfer.files[0];
        if (file.name.endsWith('.csv')) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = parseCSV(event.target.result);
                renderPalette(data);
            };
            reader.readAsText(file);
        }
    }
});

// Automatically load default data 
window.addEventListener('DOMContentLoaded', () => {
    const data = parseCSV(defaultCsv);
    renderPalette(data);
});
</script>

</body>
</html>
